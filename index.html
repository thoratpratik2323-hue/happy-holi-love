<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi, My Love!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="canvas-container" id="canvas-container">
        <!-- Color splashes will be added here via JS -->
    </div>

    <div class="content">
        <h1 class="title">Happy Holi</h1>
        <h2 class="subtitle">To My Beautiful Wife</h2>
        <p class="message">
            May our life together always be filled with the vibrant colors of joy, love, and endless happiness. <br>
            You are the brightest color in my life! ❤️
        </p>
        <button class="play-btn" id="playBtn">Tap Anywhere to Splash Colors!</button>
    </div>

    <audio id="bgMusic" src="song.webm" loop preload="auto"></audio>
    <script src="script.js"></script>
</body>

</html>
